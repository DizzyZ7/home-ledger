services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homeledger}
      POSTGRES_USER: ${POSTGRES_USER:-homeledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeledger} -d ${POSTGRES_DB:-homeledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://homeledger:change-me-local-only@db:5432/homeledger}
      ATTACHMENT_STORAGE_PATH: ${ATTACHMENT_STORAGE_PATH:-/data/attachments}
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - homeledger_attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  homeledger_attachments:
