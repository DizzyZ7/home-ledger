name: Mobile diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter-analyze-report:
    name: Flutter analyzer diagnostics
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Fetch dependencies
        run: flutter pub get
      - name: Run analyzer
        run: flutter analyze > flutter-analyze-report.txt 2>&1 || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-diagnostics
          path: apps/mobile/flutter-analyze-report.txt
          if-no-files-found: error
