name: CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  api:
    name: API tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --quiet -e '.[dev]'
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Test
        run: pytest -q

  mobile:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Fetch dependencies
        run: flutter pub get
      - name: Analyze
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee flutter-analyze-report.txt
      - name: Upload analyzer report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-report
          path: apps/mobile/flutter-analyze-report.txt
          if-no-files-found: ignore
      - name: Test
        run: |
          set -o pipefail
          flutter test 2>&1 | tee flutter-test-report.txt
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-report
          path: apps/mobile/flutter-test-report.txt
          if-no-files-found: ignore
